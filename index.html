<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Eternal Vows | For My Beloved Wife</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --gold: #ffdd99;
    --dark-bg: #0a0a1a;
    --glass: rgba(255,255,255,0.05);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  .cursor {
    position: fixed;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    mix-blend-mode: difference;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%,-50%);
    transition: transform 0.15s ease-out;
    mix-blend-mode: difference;
  }

  /* MAIN BACKGROUND SCENES */
  .universe {
    width: 100vw; height: 100vh;
    position: relative;
    overflow: hidden;
  }
  .scene {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 1.2s ease;
    pointer-events: none;
  }
  .scene.active { opacity: 1; }
  .scene-canvas { width: 100%; height: 100%; display: block; }

  /* RESPONSIVE NAVBAR */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: stretch;
    height: auto;
    min-height: 64px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    background: rgba(0,0,0,0.4);
    flex-wrap: wrap;
  }
  .nav-brand {
    padding: 0 clamp(12px, 4vw, 24px);
    display: flex;
    align-items: center;
    font-family: 'Space Mono', monospace;
    font-size: clamp(8px, 2vw, 10px);
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border-right: 1px solid rgba(255,255,255,0.06);
    white-space: nowrap;
  }
  .nav-tabs {
    display: flex;
    flex: 1;
    flex-wrap: wrap;
  }
  .nav-tab {
    flex: 1;
    min-width: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
    cursor: none;
    position: relative;
    background: transparent;
    color: rgba(255,255,255,0.35);
    font-family: 'Cormorant Garamond', serif;
    transition: color 0.4s;
    border-right: 1px solid rgba(255,255,255,0.04);
    padding: clamp(8px, 2vw, 12px) clamp(4px, 1.5vw, 6px);
    text-align: center;
  }
  @media (max-width: 480px) {
    .nav-tab { min-width: 60px; padding: 6px 3px; }
  }
  .nav-tab.active { color: rgba(255,255,255,0.9); }
  .nav-tab .tab-label { font-size: clamp(7px, 1.5vw, 8px); letter-spacing: 0.2em; text-transform: uppercase; font-family: 'Space Mono', monospace; opacity: 0.6; }
  .nav-tab.active .tab-label { opacity: 1; }
  .nav-tab .tab-emotion { font-size: clamp(11px, 3vw, 13px); font-style: italic; font-weight: 300; }
  .nav-tab .tab-indicator {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%) scaleX(0);
    width: 60%;
    height: 1px;
    background: rgba(255,255,255,0.6);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .nav-tab.active .tab-indicator { transform: translateX(-50%) scaleX(1); }

  /* ENVELOPE */
  .letter-stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  .envelope-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(12px, 3vw, 24px);
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    pointer-events: all;
  }
  .envelope-wrap.visible { opacity: 1; transform: translateY(0); }
  .envelope-wrap.opening { opacity: 0; transform: translateY(-40px) scale(0.95); }
  .envelope { width: clamp(140px, 50vw, 200px); aspect-ratio: 10/7; filter: drop-shadow(0 20px 60px rgba(0,0,0,0.6)); transition: transform 0.3s; cursor: none; }
  .envelope:hover { transform: scale(1.03) rotateZ(1deg); }
  .open-hint { font-size: clamp(8px, 2vw, 10px); letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.3); font-family: 'Space Mono', monospace; animation: pulseHint 2.5s ease-in-out infinite; cursor: pointer; }
  @keyframes pulseHint { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }

  /* OPEN LETTER CARD */
  .letter-paper {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
    padding: clamp(12px, 3vw, 20px);
  }
  .letter-paper.open { opacity: 1; pointer-events: all; }
  .letter-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); }
  .letter-card {
    position: relative;
    z-index: 1;
    width: min(600px, 90vw);
    max-height: clamp(60vh, 85vh, 90vh);
    overflow-y: auto;
    padding: clamp(20px, 5vw, 40px) clamp(16px, 4vw, 36px);
    background: rgba(255,255,255,0.04);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 2px;
    transform: translateY(30px) scale(0.97);
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    scrollbar-width: thin;
  }
  .letter-paper.open .letter-card { transform: translateY(0) scale(1); }
  .letter-decoration { font-family: 'Playfair Display', serif; font-size: clamp(60px, 15vw, 90px); font-style: italic; color: rgba(255,255,255,0.04); position: absolute; top: -10px; right: 15px; pointer-events: none; }
  .letter-mood { font-family: 'Space Mono', monospace; font-size: clamp(8px, 2vw, 9px); letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 24px; }
  .letter-salutation { font-family: 'Playfair Display', serif; font-size: clamp(16px, 4vw, 20px); font-style: italic; color: rgba(255,255,255,0.8); margin-bottom: 24px; }
  .letter-body { font-family: 'Cormorant Garamond', serif; font-size: clamp(14px, 3vw, 16px); line-height: 1.85; color: rgba(255,255,255,0.6); font-weight: 300; }
  .letter-body p { margin-bottom: 16px; }
  .letter-sign { margin-top: 32px; font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(14px, 3vw, 16px); color: rgba(255,255,255,0.4); }
  .close-letter { position: fixed; top: clamp(60px, 10vw, 80px); right: clamp(12px, 3vw, 20px); z-index: 60; background: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); font-family: 'Space Mono', monospace; font-size: clamp(9px, 2vw, 11px); padding: clamp(6px, 1.5vw, 8px) clamp(12px, 2vw, 16px); border-radius: 40px; cursor: pointer; transition: all 0.2s; opacity: 0; pointer-events: none; white-space: nowrap; }
  .letter-paper.open ~ .close-letter { pointer-events: all; opacity: 1; }
  .close-letter:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); }

  /* FLOATING ACTION BUTTONS - responsive */
  .floating-actions {
    position: fixed;
    bottom: clamp(12px, 3vw, 20px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: clamp(8px, 2vw, 12px);
    z-index: 200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
    padding: clamp(6px, 1.5vw, 8px) clamp(12px, 2vw, 16px);
    border-radius: 60px;
    border: 1px solid rgba(255,255,255,0.1);
    pointer-events: auto;
    flex-wrap: wrap;
    justify-content: center;
    width: auto;
    max-width: 95vw;
  }
  .action-btn {
    background: rgba(255,255,255,0.05);
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: clamp(9px, 2vw, 11px);
    padding: clamp(4px, 1vw, 6px) clamp(10px, 2vw, 14px);
    border-radius: 40px;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: clamp(4px, 1vw, 6px);
    white-space: nowrap;
  }
  .action-btn:hover { background: rgba(255,200,150,0.2); transform: scale(1.02); color: white; }

  /* GROWTH RING MODAL */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
    padding: clamp(12px, 3vw, 20px);
  }
  .modal.active {
    opacity: 1;
    visibility: visible;
  }
  .ring-container {
    background: rgba(20,20,35,0.95);
    border-radius: 32px;
    padding: clamp(20px, 4vw, 36px);
    width: min(520px, 95vw);
    max-height: 85vh;
    overflow-y: auto;
    text-align: center;
    border: 1px solid rgba(255,215,150,0.3);
  }
  .ring-canvas {
    width: min(200px, 50vw);
    height: min(200px, 50vw);
    margin: 16px auto;
    display: block;
  }
  .milestone-list {
    margin-top: 20px;
    text-align: left;
    font-family: 'Cormorant Garamond', serif;
    color: rgba(255,255,255,0.8);
    font-size: clamp(12px, 3vw, 15px);
  }
  .milestone-list li {
    margin: 10px 0;
    list-style: none;
    border-bottom: 1px dashed rgba(255,255,255,0.1);
    padding: 6px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* MEMORIES POLAROID GALLERY */
  .memories-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.94);
    backdrop-filter: blur(20px);
    z-index: 1100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s ease;
    padding: clamp(12px, 3vw, 20px);
  }
  .memories-modal.active {
    opacity: 1;
    visibility: visible;
  }
  .memories-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 1200px;
    margin-bottom: 20px;
    padding: 0 clamp(8px, 2vw, 12px);
    flex-wrap: wrap;
    gap: 16px;
  }
  .memories-header h2 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: clamp(18px, 5vw, 32px);
    letter-spacing: 0.05em;
    font-weight: 400;
  }
  .close-memories {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,215,150,0.3);
    color: #ffdd99;
    font-family: 'Space Mono', monospace;
    padding: clamp(4px, 1vw, 6px) clamp(12px, 2vw, 16px);
    border-radius: 40px;
    cursor: pointer;
    font-size: clamp(9px, 2vw, 11px);
    transition: all 0.2s;
  }
  .close-memories:hover { background: rgba(255,215,150,0.3); }
  .polaroid-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: clamp(16px, 3vw, 24px);
    max-width: 1300px;
    max-height: 70vh;
    overflow-y: auto;
    padding: clamp(12px, 2vw, 20px);
    width: 100%;
  }
  .polaroid {
    background: rgba(255,255,245,0.95);
    padding: clamp(8px, 2vw, 12px) clamp(8px, 2vw, 12px) clamp(14px, 3vw, 22px) clamp(8px, 2vw, 12px);
    border-radius: 12px;
    box-shadow: 0 25px 35px -12px rgba(0,0,0,0.5);
    transform: rotate(var(--rot, 0deg));
    transition: all 0.3s;
    width: clamp(130px, 25vw, 170px);
    flex-shrink: 0;
  }
  .polaroid:hover { transform: rotate(var(--rot, 0deg)) scale(1.05); }
  .polaroid-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 8px;
    background: #f0efe7;
  }
  .polaroid-caption {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(10px, 2vw, 12px);
    font-weight: 500;
    color: #2c2b28;
    text-align: center;
    font-style: italic;
    margin-top: 8px;
  }

  /* COUNTDOWN + BOTTOM ELEMENTS */
  .bottom-bar {
    position: fixed;
    bottom: clamp(8px, 2vw, 12px);
    left: 0;
    right: 0;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(8px, 2vw, 16px);
    gap: 8px;
    z-index: 15;
    pointer-events: none;
  }
  .countdown-timer {
    font-family: 'Space Mono', monospace;
    font-size: clamp(9px, 2vw, 11px);
    font-weight: 500;
    color: rgba(255,245,200,0.9);
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);
    padding: clamp(4px, 1vw, 6px) clamp(10px, 2vw, 14px);
    border-radius: 48px;
    pointer-events: none;
    letter-spacing: 0.2px;
    border: 1px solid rgba(255,215,150,0.35);
    white-space: nowrap;
  }
  .datestamp {
    font-family: 'Space Mono', monospace;
    font-size: clamp(7px, 1.5vw, 9px);
    color: rgba(255,255,255,0.35);
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    padding: clamp(3px, 0.8vw, 4px) clamp(8px, 1.5vw, 12px);
    border-radius: 40px;
    pointer-events: none;
  }
  .ambient-quote {
    position: fixed;
    bottom: clamp(8px, 2vw, 12px);
    left: 50%;
    transform: translateX(-50%);
    font-style: italic;
    font-size: clamp(9px, 2vw, 10px);
    color: rgba(255,255,255,0.25);
    white-space: nowrap;
    pointer-events: none;
    z-index: 5;
    background: rgba(0,0,0,0.3);
    padding: clamp(3px, 0.8vw, 4px) clamp(10px, 2vw, 14px);
    border-radius: 60px;
    backdrop-filter: blur(4px);
  }
  @media (max-width: 640px) {
    .bottom-bar { flex-direction: column; align-items: center; bottom: 65px; }
    .ambient-quote { bottom: 63px; }
  }

  .toast-msg {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(16px);
    padding: clamp(6px, 1.5vw, 8px) clamp(16px, 3vw, 20px);
    border-radius: 60px;
    color: #ffdd99;
    font-family: 'Space Mono', monospace;
    font-size: clamp(10px, 2vw, 12px);
    z-index: 2000;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: nowrap;
  }
  .floating-heart {
    position: fixed;
    pointer-events: none;
    font-size: clamp(20px, 5vw, 28px);
    z-index: 3000;
    animation: floatUp 1.2s ease-out forwards;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(0.5); opacity: 1; }
    100% { transform: translateY(-100px) scale(1.3); opacity: 0; }
  }

  /* LETTER CARD BACKGROUND IMAGES */
  .letter-card.bg0 {
    background: linear-gradient(135deg, rgba(20,20,40,.85), rgba(20,20,40,.92)), url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1000 1000%22%3E%3Cdefs%3E%3Cpattern id=%22p1%22 x=%220%22 y=%220%22 width=%22200%22 height=%22200%22 patternUnits=%22userSpaceOnUse%22%3E%3Cpath d=%22M100 0 L100 200 M0 100 L200 100%22 stroke=%22rgba%28255,221,153,0.08%29%22 stroke-width=%222%22/%3E%3C/pattern%3E%3C/defs%3E%3Crect width=%221000%22 height=%221000%22 fill=%22%23000%22/%3E%3Crect width=%221000%22 height=%221000%22 fill=%22url%28%23p1%29%22/%3E%3C/svg%3E');
    background-attachment: fixed;
  }
  
  .letter-card.bg1 {
    background: linear-gradient(135deg, rgba(30,20,30,.85), rgba(20,20,30,.92)), url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 800 800%22%3E%3Cdefs%3E%3CradialGradient id=%22rg1%22%3E%3Cstop offset=%220%25%22 stop-color=%22rgba%28255,221,153,0.1%29%22/%3E%3Cstop offset=%22100%25%22 stop-color=%22rgba%28255,221,153,0%29%22/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx=%22200%22 cy=%22200%22 r=%22150%22 fill=%22url%28%23rg1%29%22/%3E%3Ccircle cx=%22600%22 cy=%22600%22 r=%22150%22 fill=%22url%28%23rg1%29%22/%3E%3C/svg%3E');
    background-attachment: fixed;
  }
  
  .letter-card.bg2 {
    background: linear-gradient(135deg, rgba(25,25,40,.85), rgba(20,20,45,.92)), url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1200 1200%22%3E%3Cdefs%3E%3Cpattern id=%22p2%22 x=%220%22 y=%220%22 width=%22100%22 height=%22100%22 patternUnits=%22userSpaceOnUse%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2230%22 fill=%22none%22 stroke=%22rgba%28255,221,153,0.06%29%22 stroke-width=%221%22/%3E%3C/pattern%3E%3C/defs%3E%3Crect width=%221200%22 height=%221200%22 fill=%22%23000%22/%3E%3Crect width=%221200%22 height=%221200%22 fill=%22url%28%23p2%29%22/%3E%3C/svg%3E');
    background-attachment: fixed;
  }
  
  .letter-card.bg3 {
    background: linear-gradient(135deg, rgba(35,25,20,.85), rgba(30,20,25,.92)), url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 600 600%22%3E%3Cdefs%3E%3Cpattern id=%22p3%22 x=%220%22 y=%220%22 width=%2260%22 height=%2260%22 patternUnits=%22userSpaceOnUse%22%3E%3Cpath d=%22M30 0 Q60 30 30 60 Q0 30 30 0%22 fill=%22none%22 stroke=%22rgba%28255,221,153,0.07%29%22 stroke-width=%221.5%22/%3E%3C/pattern%3E%3C/defs%3E%3Crect width=%22600%22 height=%22600%22 fill=%22%23000%22/%3E%3Crect width=%22600%22 height=%22600%22 fill=%22url%28%23p3%29%22/%3E%3C/svg%3E');
    background-attachment: fixed;
  }
  
  .lock-screen {
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: radial-gradient(circle at center, #0f0f1f, #03030c);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(12px, 3vw, 20px);
  }
  .lock-box { 
    background: rgba(0,0,0,0.75); 
    padding: clamp(24px, 6vw, 48px) clamp(16px, 4vw, 36px); 
    border-radius: 32px; 
    text-align: center; 
    color: white; 
    border: 1px solid rgba(255,215,150,0.5);
    backdrop-filter: blur(16px);
    width: min(380px, 95vw);
  }
  .lock-box h2 { font-family: 'Playfair Display', serif; font-size: clamp(18px, 5vw, 28px); margin-bottom: 20px; color: #ffdd99; }
  .lock-box p { font-size: clamp(12px, 2.5vw, 14px); margin: 8px 0; }
  .lock-box input { 
    width: 100%; padding: clamp(10px, 2vw, 12px) clamp(12px, 2vw, 16px); margin: 20px 0; background: rgba(255,255,255,0.1); 
    border: 1px solid rgba(255,215,150,0.6); color: white; border-radius: 60px; outline: none;
    font-size: clamp(12px, 2.5vw, 15px); text-align: center; font-family: 'Space Mono', monospace;
  }
  .lock-box input::placeholder { color: rgba(255,255,255,0.5); }
  .lock-box button { 
    padding: clamp(8px, 1.5vw, 10px) clamp(20px, 3vw, 28px); 
    background: rgba(255,215,150,0.2); 
    border: 1px solid rgba(255,215,150,0.6); 
    color: #ffdd99; 
    border-radius: 60px; 
    cursor: pointer; 
    font-family: 'Space Mono', monospace;
    font-size: clamp(11px, 2vw, 13px);
    transition: all 0.2s;
  }
  .lock-box button:hover { background: rgba(255,215,150,0.4); color: white; }
  #lockError { min-height: 28px; font-size: clamp(10px, 2vw, 12px); margin-top: 10px; color: #ffaa88; }

  /* SCROLLBAR STYLING */
  ::-webkit-scrollbar {
    width: 8px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(255,221,153,0.3);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255,221,153,0.5);
  }
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <h2>💌 My Eternal Vows</h2>
    <p>Enter our secret code</p>
    <input type="password" id="sitePassword" placeholder="❤️ type the password" autocomplete="off">
    <button onclick="unlockSite()">Unlock My Heart</button>
    <p id="lockError"></p>
    <p style="margin-top:16px; font-size:clamp(10px, 2vw, 11px); opacity:0.6;">✨ hint: 2506 ✨</p>
  </div>
</div>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="universe">
  <div class="scene active" id="scene-0"><canvas class="scene-canvas" id="canvas-0"></canvas></div>
  <div class="scene" id="scene-1"><canvas class="scene-canvas" id="canvas-1"></canvas></div>
  <div class="scene" id="scene-2"><canvas class="scene-canvas" id="canvas-2"></canvas></div>
  <div class="scene" id="scene-3"><canvas class="scene-canvas" id="canvas-3"></canvas></div>
</div>

<nav class="navbar">
  <div class="nav-brand">Eternal Letters</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="0" onclick="switchTab(0)"><span class="tab-label">when you're</span><span class="tab-emotion">Overthinking</span><div class="tab-indicator"></div></button>
    <button class="nav-tab" data-tab="1" onclick="switchTab(1)"><span class="tab-label">when you're</span><span class="tab-emotion">Sad</span><div class="tab-indicator"></div></button>
    <button class="nav-tab" data-tab="2" onclick="switchTab(2)"><span class="tab-label">when you need</span><span class="tab-emotion">Reassurance</span><div class="tab-indicator"></div></button>
    <button class="nav-tab" data-tab="3" onclick="switchTab(3)"><span class="tab-label">why</span><span class="tab-emotion">I Love You</span><div class="tab-indicator"></div></button>
  </div>
</nav>

<div class="letter-stage">
  <div class="envelope-wrap visible" id="envelopeWrap" onclick="openLetter()">
    <div class="envelope"><svg viewBox="0 0 200 140" width="100%" height="100%"><rect x="0" y="15" width="200" height="125" rx="2" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/><path d="M0 15 L100 75 L200 15" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/><path d="M0 15 L100 75 M200 15 L100 75" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/></svg></div>
    <div class="open-hint">— click to open —</div>
  </div>
</div>

<div class="letter-paper" id="letterPaper">
  <div class="letter-backdrop" onclick="closeLetter()"></div>
  <div class="letter-card" id="letterCardDynamic">
    <div class="letter-decoration" id="letterDecoration">O</div>
    <div class="letter-mood" id="letterMood">when you're overthinking</div>
    <div class="letter-salutation" id="letterSalutation">Dear love,</div>
    <div class="letter-body" id="letterBody"></div>
    <div class="letter-sign" id="letterSign">— forever yours</div>
  </div>
</div>
<button class="close-letter" onclick="closeLetter()">fold it back ↩</button>

<div class="floating-actions">
  <button class="action-btn" id="growthRingBtn">🌳 Growth Ring</button>
  <button class="action-btn" id="memoriesBtn">📸 Memories</button>
  <button class="action-btn" id="sendButterflyBtn">🦋 Butterfly</button>
  <button class="action-btn" id="sendHugBtn">🤗 Hug</button>
  <button class="action-btn" id="sendKissBtn">💋 Kiss</button>
</div>

<div class="modal" id="growthModal">
  <div class="ring-container">
    <h2 style="font-family:'Playfair Display'; color:#ffdd99; font-size: clamp(18px, 4vw, 24px);">🌲 Our Growth Rings</h2>
    <canvas id="ringCanvas" width="200" height="200" class="ring-canvas"></canvas>
    <div class="milestone-list"><ul id="milestoneList"></ul></div>
    <button onclick="closeModal()" style="margin-top:20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); padding:clamp(6px, 1vw, 8px) clamp(16px, 2vw, 20px); border-radius:40px; color:white; cursor:pointer; font-size:clamp(10px, 2vw, 12px); font-family:'Space Mono', monospace; transition:all 0.2s;">Close</button>
  </div>
</div>

<div class="memories-modal" id="memoriesModal">
  <div class="memories-header">
    <h2>📷 Polaroid Memories</h2>
    <button class="close-memories" id="closeMemoriesBtn">⟳ Close</button>
  </div>
  <div class="polaroid-grid" id="polaroidGrid"></div>
</div>

<div class="ambient-quote" id="ambientQuote">"every ring tells our story"</div>
<div class="bottom-bar">
  <div class="countdown-timer" id="countdownTimer">❤️ since we met: <span id="timeSince">loading...</span></div>
  <div class="datestamp" id="datestamp"></div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
const CORRECT_PASSWORD = "2506";
const START_DATE = new Date(2026, 1, 16);
const YOUR_NAME = "Your Atta";

const LETTERS_DATA = [
  { letter:'O', label:'when you\'re overthinking', salutation:'Dear mind that won\'t rest,', sign:`— always holding you, ${YOUR_NAME}`,
    body:`<p>i Know meri jaan ke ap overthink kr rhi and meri jaan i know ap kia feel kr rhi ho now may chahta hoon ke ap imagine kro am just behind you and i grab and hugg you softly or meri jaan thri problem ko ak do bar discuss kr lain ge acha ab aye yahan par meri jaan ap nahe lo stress liye kyuki i am there for you and na to koi problem bari hai na choti sb kuch fix ho sktaa hai if you are with someone who really loves you.<br><p>meri jaan plz don\'t overthink so much kyuki overthinking makes things worse and it won\'t help you in any way so just chill and relax aur jub bhi ap overthink kro to bas mjhe bulao and we\'ll talk it out and i promise i\'ll make it all better for you ya ap mere saath time spend kro sb kuch theek ho jai ga.</p>
    <p>i love you so much meri jaan and i promise you that i will always be there for you no matter what happens in life so just trust me and believe in us.</p>`
  },
  { letter:'S', label:'when you\'re sad', salutation:'Dear aching heart,', sign:`— your home is here, ${YOUR_NAME}`,
    body:`<p>acha gee to meri jaan sad hui vi arey meri shehzadi apko koi sad hnay ki zarurat ni hai kyuki you have me and may sb ke barabar hu and am gonna fix all your sadness jab mjhy pata chalay ga ke ap sad ho to mjhe buhat bura lagta hai kyuki apka sadness mjhe bhi sadness de deta hai.<br></p>
    <p>ap know kr rhi ho ke am always there for you to make you laugh and smile aur meri jaan ap jub bhi sad feel kro to bas mjhe ek call krna ya message krna and i\'ll do whatever it takes to make you happy again whether it\'s talking to you all night or doing something silly to make you laugh.</p>
    <p>so meri jaan plz don\'t be sad aur remember that you have me and i will always be by your side through thick and thin and we\'ll face everything together. i love you so much.</p>`
  },
  { letter:'R', label:'when you need Reassurance', salutation:'Dear wandering soul,', sign:`— I'll be your compass, ${YOUR_NAME}`,
    body:`<p>ummmm now i gotta tell you how much i love you and why i love you acha s meri jaan first of all jo mjhe apse hai na wo ajtk na kisi se hua hai and na mjhe kisi or se hoskta hai ab mere liye sirf ap hoo aur hamesha rahogi.<br></p>
    <p>i love the way you smile at me, the way you laugh, the way you care about me and everyone around you. i love how passionate you are about things you believe in and i love your strength and your vulnerability at the same time.</p>
    <p>meri jaan ap mere liye everything ho and i promise you that i will love you with all my heart for the rest of my life. you are my forever, my always, my everything. so jub bhi ap doubt feel kro to yaad rakho ke am completely and totally in love with you.</p>`
  },
  { letter:'L', label:'why I Love You', salutation:'My eternal flame,', sign:`— yours endlessly, ${YOUR_NAME}`,
    body:`<p>1. I love the way you smile when you first wake up in the morning.<br> 2. I love how your laughter fills a room with warmth.<br> 3. I love the kindness you show to everyone you meet.<br> 4. I love your strength and resilience in tough times.<br> 5. I love how you make me feel like the luckiest person alive.<br> 6. I love your dreams and ambitions.<br> 7. I love the way you love me back.<br> 8. I love your loyalty and how you never give up on people you care about.<br> 9. I love the little things you do that show you care.<br> 10. I love you for being exactly who you are, and I wouldn\'t change a single thing about you.</p>
    <p>Meri jaan, every day with you is a blessing, and I fall in love with you a little more each passing day.</p>`
  }
];

const MILESTONES = [
  { emoji: "✨", text: "First 'I love you' — whispered at midnight" },
  { emoji: "🏡", text: "Promised forever — heart to heart" },
  { emoji: "💍", text: "The eternal vow — always and beyond" }
];

const nicknameMessages = ["My Tayyaba", "My Jaan", "Meri Rasmalai", "Meri Cutie", "My Penguin", "My Love", "My Wife", "My Happiness", "Mera Sakoon", "My Girl", "Meri Sherni", "My Last Investment", "My Heartbeat", "My Queen"];
const POLAROID_DATA = [];
for (let i = 1; i <= 24; i++) {
  POLAROID_DATA.push({
    imgSrc: `assets/polaroids/${i}.jpg`,
    message: `🦋 ${nicknameMessages[(i-1) % nicknameMessages.length]}`,
    rotation: (Math.random() * 3 - 1.5).toFixed(1)
  });
}

function unlockSite() {
  const pass = document.getElementById('sitePassword').value;
  if (pass === CORRECT_PASSWORD) {
    document.getElementById('lockScreen').style.display = 'none';
    updateLoveCountdown();
    setInterval(updateLoveCountdown, 1000);
    initMusic();
  } else {
    document.getElementById('lockError').innerText = '💔 Wrong password, my love. Try again.';
  }
}
document.getElementById('sitePassword').addEventListener('keypress', e => { if (e.key === 'Enter') unlockSite(); });

let bgMusic = null;
function initMusic() {
  if (bgMusic) return;
  bgMusic = new Audio("assets/music.mp3");
  bgMusic.loop = true;
  bgMusic.volume = 0.2;
  bgMusic.play().catch(() => {});
}
document.body.addEventListener('click', () => { if (bgMusic && bgMusic.paused) bgMusic.play(); else if (!bgMusic) initMusic(); });

function updateLoveCountdown() {
  const now = new Date();
  const diffMs = now - START_DATE;
  if (diffMs < 0) { document.getElementById('timeSince').innerHTML = `soon, my love`; return; }
  const totalSecs = Math.floor(diffMs / 1000);
  const days = Math.floor(totalSecs / 86400);
  const hours = Math.floor((totalSecs % 86400) / 3600);
  const mins = Math.floor((totalSecs % 3600) / 60);
  const secs = totalSecs % 60;
  document.getElementById('timeSince').innerHTML = `<span>${days}</span>d <span>${hours}</span>h <span>${mins}</span>m <span>${secs}</span>s`;
}

let currentTypingTimeout = null;
function typeTextIntoContainer(container, html) {
  if(currentTypingTimeout) clearTimeout(currentTypingTimeout);
  container.innerHTML = '';
  const tempDiv = document.createElement('div'); tempDiv.innerHTML = html;
  let pcs = [];
  tempDiv.childNodes.forEach(node => { if(node.nodeType === 1 && node.tagName === 'P') pcs.push(node.innerHTML); });
  if(pcs.length === 0 && html.trim()) pcs.push(html);
  let pIdx=0, cIdx=0, curP=null;
  function type(){
    if(pIdx >= pcs.length) return;
    if(!curP){ curP=document.createElement('p'); container.appendChild(curP); curP._rich = pcs[pIdx]; curP.innerHTML = ''; cIdx=0; }
    const rich = curP._rich;
    if(cIdx < rich.length){
      let step = 1;
      if(rich[cIdx] === '<'){ let eIdx = rich.indexOf('>', cIdx); if(eIdx !== -1) step = eIdx - cIdx + 1; }
      curP.innerHTML += rich.substr(cIdx, step);
      cIdx += step;
      currentTypingTimeout = setTimeout(type, 20);
    } else { pIdx++; curP = null; currentTypingTimeout = setTimeout(type, 50); }
  }
  type();
}

function renderLetterWithTyping(idx){ 
  const d = LETTERS_DATA[idx]; 
  document.getElementById('letterDecoration').textContent = d.letter;
  document.getElementById('letterMood').textContent = d.label;
  document.getElementById('letterSalutation').textContent = d.salutation;
  document.getElementById('letterSign').textContent = d.sign;
  typeTextIntoContainer(document.getElementById('letterBody'), d.body);
  document.getElementById('letterCardDynamic').className = `letter-card bg${idx}`;
}
function openLetter(){ 
  document.getElementById('envelopeWrap').classList.add('opening'); 
  renderLetterWithTyping(currentTab); 
  setTimeout(()=>{ 
    document.getElementById('letterPaper').classList.add('open'); 
    letterOpen=true;
  }, 500);
}
function closeLetter(){ 
  if(currentTypingTimeout) clearTimeout(currentTypingTimeout); 
  document.getElementById('letterPaper').classList.remove('open'); 
  letterOpen=false; 
  const wrap=document.getElementById('envelopeWrap');
  wrap.classList.remove('opening');
  setTimeout(()=>wrap.classList.add('visible'), 200);
}
let letterOpen=false, currentTab=0;
function switchTab(idx){ 
  if(letterOpen) closeLetter(); 
  currentTab=idx; 
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',i===idx)); 
  document.querySelectorAll('.scene').forEach((s,i)=>s.classList.toggle('active',i===idx)); 
}

function drawGrowthRing(){ 
  const canvas=document.getElementById('ringCanvas'); 
  if(!canvas)return; 
  const ctx=canvas.getContext('2d'); 
  const size=Math.min(200, window.innerWidth*0.4); 
  canvas.width=size; canvas.height=size; 
  const cx=size/2, cy=size/2, baseR=size/6;
  for(let i=0;i<3;i++){ 
    ctx.beginPath(); 
    ctx.arc(cx, cy, baseR*(i+1), 0, Math.PI*2); 
    ctx.strokeStyle=`rgba(255,221,153,${0.4-i*0.1})`; 
    ctx.lineWidth=2; 
    ctx.stroke(); 
  }
}
function openGrowthModal(){ 
  drawGrowthRing(); 
  const listEl=document.getElementById('milestoneList'); 
  listEl.innerHTML=''; 
  MILESTONES.forEach(m=>{
    let li=document.createElement('li'); 
    li.innerHTML=`<span style="font-size:20px;">${m.emoji}</span><span>${m.text}</span>`; 
    listEl.appendChild(li);
  }); 
  document.getElementById('growthModal').classList.add('active');
}
function closeModal(){ document.getElementById('growthModal').classList.remove('active'); }

function buildPolaroidGallery() {
  const grid = document.getElementById('polaroidGrid');
  grid.innerHTML = '';
  POLAROID_DATA.forEach((item, idx) => {
    const polaroid = document.createElement('div'); polaroid.className = 'polaroid'; polaroid.style.setProperty('--rot', `${item.rotation}deg`);
    const img = document.createElement('img'); img.src = item.imgSrc; img.className = 'polaroid-img'; img.alt = `memory ${idx+1}`;
    img.onerror = () => { img.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23ffdd9944"/%3E%3Ctext x="50" y="60" font-size="40" fill="%23ffdd99" text-anchor="middle" dominant-baseline="middle"%3E📸%3C/text%3E%3C/svg%3E'; };
    const caption = document.createElement('div'); caption.className = 'polaroid-caption'; caption.innerText = item.message;
    polaroid.appendChild(img); polaroid.appendChild(caption); grid.appendChild(polaroid);
  });
}
function openMemoriesModal() { buildPolaroidGallery(); document.getElementById('memoriesModal').classList.add('active'); }
function closeMemoriesModal() { document.getElementById('memoriesModal').classList.remove('active'); }

function showToast(msg){ let t=document.getElementById('toastMsg'); t.textContent=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2000); }
function createFloatingEmoji(emoji,x=window.innerWidth/2,y=window.innerHeight-120){ let d=document.createElement('div'); d.className='floating-heart'; d.textContent=emoji; d.style.left=x+'px'; d.style.top=y+'px'; document.body.appendChild(d); setTimeout(()=>d.remove(),1300); }
function sendButterfly(){ showToast("🦋 A butterfly carries your whisper..."); createFloatingEmoji("🦋"); }
function sendVirtualHug(){ showToast("🤗 A warm hug from across the distance"); for(let i=0;i<5;i++) setTimeout(()=>createFloatingEmoji("🤗", window.innerWidth/2+(Math.random()-0.5)*80), i*80); }
function sendVirtualKiss(){ showToast("💋 A soft kiss on your forehead"); for(let i=0;i<8;i++) setTimeout(()=>createFloatingEmoji("💋", window.innerWidth/2+(Math.random()-0.5)*100), i*60); }

const cursor=document.getElementById('cursor'), ring=document.getElementById('cursorRing'); let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
function animate(){rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12; ring.style.left=rx+'px';ring.style.top=ry+'px'; requestAnimationFrame(animate);} animate();

function setupCanvas(c){c.width=window.innerWidth;c.height=window.innerHeight; return c.getContext('2d');}
function drawGradientScene(canvas, color1, color2){ let ctx=setupCanvas(canvas); function draw(){let grad=ctx.createLinearGradient(0,0,canvas.width,canvas.height); grad.addColorStop(0,color1); grad.addColorStop(1,color2); ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);} draw(); window.addEventListener('resize',draw);}
drawGradientScene(document.getElementById('canvas-0'), '#0a0a1a', '#1a1a2e');
drawGradientScene(document.getElementById('canvas-1'), '#0f121f', '#191e2f');
drawGradientScene(document.getElementById('canvas-2'), '#0a0a0f', '#1f1a2a');
drawGradientScene(document.getElementById('canvas-3'), '#1f180a', '#2a2215');
document.getElementById('datestamp').innerHTML = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}).toUpperCase();

window.switchTab=switchTab; window.openLetter=openLetter; window.closeLetter=closeLetter; window.unlockSite=unlockSite; window.closeModal=closeModal;
document.getElementById('growthRingBtn').addEventListener('click', openGrowthModal);
document.getElementById('memoriesBtn').addEventListener('click', openMemoriesModal);
document.getElementById('closeMemoriesBtn').addEventListener('click', closeMemoriesModal);
document.getElementById('sendButterflyBtn').addEventListener('click', sendButterfly);
document.getElementById('sendHugBtn').addEventListener('click', sendVirtualHug);
document.getElementById('sendKissBtn').addEventListener('click', sendVirtualKiss);
window.addEventListener('resize', ()=>{ if(document.getElementById('growthModal').classList.contains('active')) drawGrowthRing(); });
</script>
</body>
</html>

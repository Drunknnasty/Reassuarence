<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Eternal Vows | For My Beloved Wife</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --gold: #ffdd99;
    --dark-bg: #0a0a1a;
    --glass: rgba(255,255,255,0.05);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  /* Hide custom cursor on touch devices */
  @media (hover: hover) and (pointer: fine) {
    .cursor, .cursor-ring { display: block; }
    body { cursor: none; }
  }
  @media (hover: none), (pointer: coarse) {
    .cursor, .cursor-ring { display: none; }
    body { cursor: auto; }
  }
  
  .cursor {
    position: fixed;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    mix-blend-mode: difference;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%,-50%);
    transition: transform 0.15s ease-out;
    mix-blend-mode: difference;
  }

  /* MAIN BACKGROUND SCENES */
  .universe {
    width: 100vw; height: 100vh;
    position: relative;
    overflow: hidden;
  }
  .scene {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 1.2s ease;
    pointer-events: none;
  }
  .scene.active { opacity: 1; }
  .scene-canvas { width: 100%; height: 100%; display: block; }

  /* RESPONSIVE NAVBAR */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: stretch;
    height: auto;
    min-height: 56px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    background: rgba(0,0,0,0.4);
    flex-wrap: wrap;
  }
  .nav-brand {
    padding: 0 clamp(10px, 3vw, 20px);
    display: flex;
    align-items: center;
    font-family: 'Space Mono', monospace;
    font-size: clamp(7px, 1.8vw, 9px);
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border-right: 1px solid rgba(255,255,255,0.06);
    white-space: nowrap;
  }
  .nav-tabs {
    display: flex;
    flex: 1;
    flex-wrap: wrap;
  }
  .nav-tab {
    flex: 1;
    min-width: 65px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 3px;
    cursor: pointer;
    position: relative;
    background: transparent;
    color: rgba(255,255,255,0.35);
    font-family: 'Cormorant Garamond', serif;
    transition: color 0.4s;
    border-right: 1px solid rgba(255,255,255,0.04);
    padding: 8px 3px;
    text-align: center;
  }
  @media (max-width: 480px) {
    .nav-tab { min-width: 55px; padding: 6px 2px; }
    .nav-brand { padding: 0 8px; font-size: 6px; }
  }
  .nav-tab.active { color: rgba(255,255,255,0.9); }
  .nav-tab .tab-label { font-size: clamp(6px, 1.5vw, 7px); letter-spacing: 0.15em; text-transform: uppercase; font-family: 'Space Mono', monospace; opacity: 0.6; }
  .nav-tab.active .tab-label { opacity: 1; }
  .nav-tab .tab-emotion { font-size: clamp(10px, 2.5vw, 12px); font-style: italic; font-weight: 300; }
  .nav-tab .tab-indicator {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%) scaleX(0);
    width: 50%;
    height: 1px;
    background: rgba(255,255,255,0.6);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .nav-tab.active .tab-indicator { transform: translateX(-50%) scaleX(1); }

  /* ENVELOPE */
  .letter-stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  .envelope-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(12px, 3vw, 24px);
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    pointer-events: all;
  }
  .envelope-wrap.visible { opacity: 1; transform: translateY(0); }
  .envelope-wrap.opening { opacity: 0; transform: translateY(-40px) scale(0.95); }
  .envelope { width: clamp(130px, 45vw, 180px); aspect-ratio: 10/7; filter: drop-shadow(0 20px 60px rgba(0,0,0,0.6)); transition: transform 0.3s; cursor: pointer; }
  .envelope:hover { transform: scale(1.03) rotateZ(1deg); }
  .open-hint { font-size: clamp(8px, 2vw, 10px); letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.3); font-family: 'Space Mono', monospace; animation: pulseHint 2.5s ease-in-out infinite; cursor: pointer; }
  @keyframes pulseHint { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }

  /* OPEN LETTER CARD */
  .letter-paper {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
    padding: clamp(12px, 3vw, 20px);
  }
  .letter-paper.open { opacity: 1; pointer-events: all; }
  .letter-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); }
  .letter-card {
    position: relative;
    z-index: 1;
    width: min(600px, 90vw);
    max-height: clamp(60vh, 85vh, 90vh);
    overflow-y: auto;
    padding: clamp(20px, 5vw, 40px) clamp(16px, 4vw, 36px);
    background-size: cover !important;
    background-position: center !important;
    background-repeat: no-repeat !important;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 2px;
    transform: translateY(30px) scale(0.97);
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    scrollbar-width: thin;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  }
  .letter-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(2px);
    z-index: 0;
    border-radius: 2px;
  }
  .letter-card > * {
    position: relative;
    z-index: 1;
  }
  .letter-paper.open .letter-card { transform: translateY(0) scale(1); }
  .letter-decoration { font-family: 'Playfair Display', serif; font-size: clamp(60px, 15vw, 90px); font-style: italic; color: rgba(255,255,255,0.08); position: absolute; top: -10px; right: 15px; pointer-events: none; z-index: 2; }
  .letter-mood { font-family: 'Space Mono', monospace; font-size: clamp(8px, 2vw, 9px); letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
  .letter-salutation { font-family: 'Playfair Display', serif; font-size: clamp(16px, 4vw, 20px); font-style: italic; color: rgba(255,255,255,0.9); margin-bottom: 24px; }
  .letter-body { font-family: 'Cormorant Garamond', serif; font-size: clamp(14px, 3vw, 16px); line-height: 1.85; color: rgba(255,255,255,0.75); font-weight: 300; }
  .letter-body p { margin-bottom: 16px; }
  .letter-sign { margin-top: 32px; font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(14px, 3vw, 16px); color: rgba(255,255,255,0.5); }
  .close-letter { position: fixed; top: clamp(60px, 10vw, 80px); right: clamp(12px, 3vw, 20px); z-index: 60; background: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); font-family: 'Space Mono', monospace; font-size: clamp(9px, 2vw, 11px); padding: clamp(6px, 1.5vw, 8px) clamp(12px, 2vw, 16px); border-radius: 40px; cursor: pointer; transition: all 0.2s; opacity: 0; pointer-events: none; white-space: nowrap; }
  .letter-paper.open ~ .close-letter { pointer-events: all; opacity: 1; }
  .close-letter:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); }

  /* FLOATING ACTION BUTTONS - COMPLETELY REDESIGNED FOR ANDROID */
  .floating-actions {
    position: fixed;
    bottom: 16px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 8px;
    z-index: 200;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(20px);
    padding: 10px 16px;
    border-radius: 60px;
    border: 1px solid rgba(255,255,255,0.12);
    pointer-events: auto;
    width: fit-content;
    margin: 0 auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    flex-wrap: wrap;
    max-width: 94vw;
  }
  .action-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 40px;
    color: rgba(255,255,255,0.9);
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    font-weight: 500;
    letter-spacing: 0.3px;
    min-width: auto;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active { transform: scale(0.96); background: rgba(255,200,150,0.3); }
  
  @media (max-width: 550px) {
    .floating-actions { padding: 8px 12px; gap: 6px; bottom: 12px; }
    .action-btn { padding: 6px 10px; font-size: 10px; }
  }
  @media (max-width: 420px) {
    .floating-actions { padding: 7px 10px; gap: 5px; }
    .action-btn { padding: 5px 8px; font-size: 9px; }
  }

  /* GROWTH RING MODAL */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
    padding: clamp(12px, 3vw, 20px);
  }
  .modal.active {
    opacity: 1;
    visibility: visible;
  }
  .ring-container {
    background: rgba(20,20,35,0.95);
    border-radius: 32px;
    padding: clamp(20px, 4vw, 36px);
    width: min(520px, 95vw);
    max-height: 85vh;
    overflow-y: auto;
    text-align: center;
    border: 1px solid rgba(255,215,150,0.3);
  }
  .ring-canvas {
    width: min(200px, 50vw);
    height: min(200px, 50vw);
    margin: 16px auto;
    display: block;
  }
  .milestone-list {
    margin-top: 20px;
    text-align: left;
    font-family: 'Cormorant Garamond', serif;
    color: rgba(255,255,255,0.8);
    font-size: clamp(12px, 3vw, 15px);
  }
  .milestone-list li {
    margin: 10px 0;
    list-style: none;
    border-bottom: 1px dashed rgba(255,255,255,0.1);
    padding: 6px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* MEMORIES POLAROID GALLERY */
  .memories-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.94);
    backdrop-filter: blur(20px);
    z-index: 1100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s ease;
    padding: clamp(12px, 3vw, 20px);
  }
  .memories-modal.active {
    opacity: 1;
    visibility: visible;
  }
  .memories-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 1200px;
    margin-bottom: 20px;
    padding: 0 clamp(8px, 2vw, 12px);
    flex-wrap: wrap;
    gap: 16px;
  }
  .memories-header h2 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: clamp(18px, 5vw, 32px);
    letter-spacing: 0.05em;
    font-weight: 400;
  }
  .close-memories {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,215,150,0.3);
    color: #ffdd99;
    font-family: 'Space Mono', monospace;
    padding: clamp(4px, 1vw, 6px) clamp(12px, 2vw, 16px);
    border-radius: 40px;
    cursor: pointer;
    font-size: clamp(9px, 2vw, 11px);
    transition: all 0.2s;
  }
  .close-memories:hover { background: rgba(255,215,150,0.3); }
  .polaroid-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: clamp(16px, 3vw, 24px);
    max-width: 1300px;
    max-height: 70vh;
    overflow-y: auto;
    padding: clamp(12px, 2vw, 20px);
    width: 100%;
  }
  .polaroid {
    background: rgba(255,255,245,0.95);
    padding: clamp(8px, 2vw, 12px) clamp(8px, 2vw, 12px) clamp(14px, 3vw, 22px) clamp(8px, 2vw, 12px);
    border-radius: 12px;
    box-shadow: 0 25px 35px -12px rgba(0,0,0,0.5);
    transform: rotate(var(--rot, 0deg));
    transition: all 0.3s;
    width: clamp(130px, 25vw, 170px);
    flex-shrink: 0;
  }
  .polaroid:hover { transform: rotate(var(--rot, 0deg)) scale(1.05); }
  .polaroid-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 8px;
    background: #f0efe7;
  }
  .polaroid-caption {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(10px, 2vw, 12px);
    font-weight: 500;
    color: #2c2b28;
    text-align: center;
    font-style: italic;
    margin-top: 8px;
  }

  /* COUNTDOWN - SEPARATE FROM BUTTONS, NO OVERLAP */
  .bottom-info {
    position: fixed;
    bottom: 16px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    z-index: 15;
    pointer-events: none;
    flex-wrap: wrap;
    padding: 0 12px;
  }
  .countdown-timer {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: rgba(255,245,200,0.95);
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(12px);
    padding: 5px 14px;
    border-radius: 40px;
    pointer-events: none;
    letter-spacing: 0.2px;
    border: 1px solid rgba(255,215,150,0.4);
    white-space: nowrap;
  }
  .datestamp {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    padding: 5px 12px;
    border-radius: 40px;
    pointer-events: none;
    white-space: nowrap;
  }
  
  /* Adjust for smaller screens - move bottom info higher to avoid overlap with buttons */
  @media (max-width: 550px) {
    .bottom-info {
      bottom: 75px;
    }
    .floating-actions {
      bottom: 12px;
    }
  }
  @media (max-width: 420px) {
    .bottom-info {
      bottom: 70px;
    }
    .countdown-timer { font-size: 8px; padding: 4px 10px; }
    .datestamp { font-size: 7px; padding: 4px 8px; }
  }
  @media (min-width: 551px) {
    .bottom-info {
      bottom: 16px;
    }
    .floating-actions {
      bottom: 16px;
    }
  }

  .ambient-quote {
    position: fixed;
    top: auto;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-style: italic;
    font-size: 9px;
    color: rgba(255,255,255,0.25);
    white-space: nowrap;
    pointer-events: none;
    z-index: 5;
    background: rgba(0,0,0,0.3);
    padding: 3px 12px;
    border-radius: 60px;
    backdrop-filter: blur(4px);
  }
  @media (max-width: 550px) {
    .ambient-quote { bottom: 95px; }
  }

  .toast-msg {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(16px);
    padding: 8px 20px;
    border-radius: 60px;
    color: #ffdd99;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    z-index: 2000;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: nowrap;
  }
  .floating-heart {
    position: fixed;
    pointer-events: none;
    font-size: clamp(20px, 5vw, 28px);
    z-index: 3000;
    animation: floatUp 1.2s ease-out forwards;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(0.5); opacity: 1; }
    100% { transform: translateY(-100px) scale(1.3); opacity: 0; }
  }
  
  .lock-screen {
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: radial-gradient(circle at center, #2a2a3ecc, #151525dd);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(12px, 3vw, 20px);
  }
  .lock-box { 
    background: rgba(0,0,0,0.65); 
    padding: clamp(24px, 6vw, 48px) clamp(16px, 4vw, 36px); 
    border-radius: 32px; 
    text-align: center; 
    color: white; 
    border: 1px solid rgba(255,215,150,0.5);
    backdrop-filter: blur(16px);
    width: min(380px, 95vw);
  }
  .lock-box h2 { font-family: 'Playfair Display', serif; font-size: clamp(18px, 5vw, 28px); margin-bottom: 20px; color: #ffdd99; }
  .lock-box p { font-size: clamp(12px, 2.5vw, 14px); margin: 8px 0; }
  .lock-box input { 
    width: 100%; padding: clamp(10px, 2vw, 12px) clamp(12px, 2vw, 16px); margin: 20px 0; background: rgba(255,255,255,0.1); 
    border: 1px solid rgba(255,215,150,0.6); color: white; border-radius: 60px; outline: none;
    font-size: clamp(12px, 2.5vw, 15px); text-align: center; font-family: 'Space Mono', monospace;
  }
  .lock-box input::placeholder { color: rgba(255,255,255,0.5); }
  .lock-box button { 
    padding: clamp(8px, 1.5vw, 10px) clamp(20px, 3vw, 28px); 
    background: rgba(255,215,150,0.2); 
    border: 1px solid rgba(255,215,150,0.6); 
    color: #ffdd99; 
    border-radius: 60px; 
    cursor: pointer; 
    font-family: 'Space Mono', monospace;
    font-size: clamp(11px, 2vw, 13px);
    transition: all 0.2s;
  }
  .lock-box button:hover { background: rgba(255,215,150,0.4); color: white; }
  #lockError { min-height: 28px; font-size: clamp(10px, 2vw, 12px); margin-top: 10px; color: #ffaa88; }

  ::-webkit-scrollbar {
    width: 8px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(255,221,153,0.3);
    border-radius: 4px;
  }
  
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <h2>💌 My Eternal Vows</h2>
    <p>Enter our secret code</p>
    <input type="password" id="sitePassword" placeholder="❤️ type the password" autocomplete="off">
    <button onclick="unlockSite()">Unlock My Heart</button>
    <p id="lockError"></p>
    <p style="margin-top:16px; font-size:clamp(10px, 2vw, 11px); opacity:0.6;">✨ hint: 2506 ✨</p>
  </div>
</div>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="universe">
  <div class="scene active" id="scene-0"><canvas class="scene-canvas" id="canvas-0"></canvas></div>
  <div class="scene" id="scene-1"><canvas class="scene-canvas" id="canvas-1"></canvas></div>
  <div class="scene" id="scene-2"><canvas class="scene-canvas" id="canvas-2"></canvas></div>
  <div class="scene" id="scene-3"><canvas class="scene-canvas" id="canvas-3"></canvas></div>
</div>

<nav class="navbar">
  <div class="nav-brand">Eternal Letters</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="0" onclick="switchTab(0)"><span class="tab-label">when you're</span><span class="tab-emotion">Overthinking</span><div class="tab-indicator"></div></button>
    <button class="nav-tab" data-tab="1" onclick="switchTab(1)"><span class="tab-label">when you're</span><span class="tab-emotion">Sad</span><div class="tab-indicator"></div></button>
    <button class="nav-tab" data-tab="2" onclick="switchTab(2)"><span class="tab-label">when you need</span><span class="tab-emotion">Reassurance</span><div class="tab-indicator"></div></button>
    <button class="nav-tab" data-tab="3" onclick="switchTab(3)"><span class="tab-label">why</span><span class="tab-emotion">I Love You</span><div class="tab-indicator"></div></button>
  </div>
</nav>

<div class="letter-stage">
  <div class="envelope-wrap visible" id="envelopeWrap" onclick="openLetter()">

let bgMusic = null;
function initMusic() {

  bgMusic = new Audio("assets/music.mp3");
  bgMusic.loop = true;
  bgMusic.volume = 0.2;
  bgMusic.play().catch(() => {});
}
document.body.addEventListener('click', () => { if (bgMusic && bgMusic.paused) bgMusic.play(); else if (!bgMusic) initMusic(); });

function updateLoveCountdown() {
  const now = new Date();
  const diffMs = now - START_DATE;
  if (diffMs < 0) { document.getElementById('timeSince').innerHTML = `soon, my love`; return; }
  const totalSecs = Math.floor(diffMs / 1000);
  const days = Math.floor(totalSecs / 86400);
  const hours = Math.floor((totalSecs % 86400) / 3600);
  const mins = Math.floor((totalSecs % 3600) / 60);
  const secs = totalSecs % 60;
  document.getElementById('timeSince').innerHTML = `<span>${days}</span>d <span>${hours}</span>h <span>${mins}</span>m <span>${secs}</span>s`;
}

let currentTypingTimeout = null;
function typeTextIntoContainer(container, html) {
  if(currentTypingTimeout) clearTimeout(currentTypingTimeout);
  container.innerHTML = '';
  const tempDiv = document.createElement('div'); tempDiv.innerHTML = html;
  let pcs = [];
  tempDiv.childNodes.forEach(node => { if(node.nodeType === 1 && node.tagName === 'P') pcs.push(node.innerHTML); });
  if(pcs.length === 0 && html.trim()) pcs.push(html);
  let pIdx=0, cIdx=0, curP=null;
  function type(){
    if(pIdx >= pcs.length) return;
    if(!curP){ curP=document.createElement('p'); container.appendChild(curP); curP._rich = pcs[pIdx]; curP.innerHTML = ''; cIdx=0; }
    const rich = curP._rich;
    if(cIdx < rich.length){
      let step = 1;
      if(rich[cIdx] === '<'){ let eIdx = rich.indexOf('>', cIdx); if(eIdx !== -1) step = eIdx - cIdx + 1; }
      curP.innerHTML += rich.substr(cIdx, step);
      cIdx += step;
      currentTypingTimeout = setTimeout(type, 20);
    } else { pIdx++; curP = null; currentTypingTimeout = setTimeout(type, 50); }
  }
  type();
}

}

}

function drawGrowthRing(){ 
  const canvas=document.getElementById('ringCanvas'); 
  if(!canvas)return; 
  const ctx=canvas.getContext('2d'); 
  const size=Math.min(200, window.innerWidth*0.4); 
  canvas.width=size; canvas.height=size; 
  const cx=size/2, cy=size/2, baseR=size/6;
  ctx.clearRect(0,0,size,size);
  for(let i=0;i<3;i++){ 
    ctx.beginPath(); 
    ctx.arc(cx, cy, baseR*(i+1), 0, Math.PI*2); 
    ctx.strokeStyle=`rgba(255,221,153,${0.5-i*0.1})`; 
    ctx.lineWidth=2.5; 
    ctx.stroke(); 
  }
}

function setupCanvas(canvasId) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  function resizeAndDraw() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const grad = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    if(canvasId === 'canvas-0') { grad.addColorStop(0,'#0a0a1a'); grad.addColorStop(1,'#1a1a2e'); }
    else if(canvasId === 'canvas-1') { grad.addColorStop(0,'#0f121f'); grad.addColorStop(1,'#191e2f'); }
    else if(canvasId === 'canvas-2') { grad.addColorStop(0,'#0a0a0f'); grad.addColorStop(1,'#1f1a2a'); }
    else { grad.addColorStop(0,'#1f180a'); grad.addColorStop(1,'#2a2215'); }
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  resizeAndDraw();
  window.addEventListener('resize', resizeAndDraw);
}
